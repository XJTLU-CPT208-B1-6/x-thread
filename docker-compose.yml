version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: xthread-postgres
    environment:
      POSTGRES_USER: xthread
      POSTGRES_PASSWORD: xthread_dev
      POSTGRES_DB: xthread
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: xthread-redis
    ports:
      - '6379:6379'
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: xthread-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  minio_data:
